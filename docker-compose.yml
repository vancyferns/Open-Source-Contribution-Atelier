version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: contribution_atelier_db
    environment:
      POSTGRES_DB: contribution_atelier
      POSTGRES_USER: contribution_atelier
      POSTGRES_PASSWORD: contribution_atelier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: contribution_atelier_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: contribution_atelier_backend
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: contribution_atelier_frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
